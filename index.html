<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>invinoveritas – Lightning Decision Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 40px;
    text-align: center;
}

h1 {
    font-size: 42px;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

.box {
    margin-top: 40px;
    padding: 25px;
    background: #1a1a1a;
    border-radius: 12px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #ff9900;
    color: black;
}

input {
    width: 90%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
</style>
</head>

<body>

<h1>invinoveritas ⚡</h1>
<p>Lightning‑paid decision intelligence for humans and AI agents</p>

<div class="box">

<h2>Ask a question</h2>

<input id="question" placeholder="Should I increase my BTC exposure?" />
<br>
<button onclick="sendQuestion()">Ask</button>

<pre id="output"></pre>

</div>

<script>
async function sendQuestion() {
    const q = document.getElementById("question").value;

    const response = await fetch("/reason", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
    });

    const text = await response.text();
    document.getElementById("output").innerText = text;
}
</script>

</body>
</html>
