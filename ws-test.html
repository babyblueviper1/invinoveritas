<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: #ddd; padding: 20px; }
        #log { background: #111; padding: 15px; border-radius: 8px; height: 500px; overflow-y: auto; }
        .connected { color: #4ade80; }
    </style>
</head>
<body>
    <h1>⚡ invinoveritas WebSocket Test</h1>
    <p>Status: <span id="status">Connecting...</span></p>
    <div id="log"></div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');

        const ws = new WebSocket("wss://invinoveritas.onrender.com/ws");

        ws.onopen = () => {
            status.textContent = "✅ Connected";
            status.style.color = "#4ade80";
            log.innerHTML += "<p>WebSocket connected successfully</p>";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            log.innerHTML += `<p><strong>${data.type}</strong>: ${data.title || data.message}</p>`;
            log.scrollTop = log.scrollHeight;
        };

        ws.onerror = (err) => {
            status.textContent = "❌ Error";
            status.style.color = "#f87171";
            log.innerHTML += "<p style='color:#f87171'>WebSocket error occurred</p>";
        };

        ws.onclose = () => {
            status.textContent = "🔴 Disconnected";
            status.style.color = "#f87171";
        };

        // Auto ping every 30s
        setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send("ping");
            }
        }, 30000);
    </script>
</body>
</html>
