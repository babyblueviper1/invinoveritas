[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "invinoveritas"
version = "0.1.0"
description = "Lightning-paid reasoning and decision intelligence for autonomous agents"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "invinoveritas", email = "babyblueviperbusiness@gmail.com" }]

keywords = ["lightning", "bitcoin", "l402", "ai", "agents", "reasoning", "mcp"]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
async = ["httpx>=0.25.0"]
dev = [
    "httpx>=0.25.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://invinoveritas.onrender.com"
Repository = "https://github.com/babyblueviper1/invinoveritas"
"Bug Tracker" = "https://github.com/babyblueviper1/invinoveritas/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["invinoveritas_sdk*"]

[tool.setuptools.dynamic]
version = {attr = "invinoveritas_sdk.__version__"}   # optional: if you want to manage version in code
